<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quiz App To Test Yourself">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Quiz App</title>
</head>
<body>
    <div class="offcanvas">
        <i class="fa-regular fa-sun icon"></i>
        <h3>Customize Your Quiz</h3>
        <select>
            <option selected>html</option>
            <option>css</option>
            <option>javascript</option>
            <option>git</option>
            <option>bootstrap</option>
        </select>
        <div class="font">
            <h3>Choose Font Color</h3>
            <ul>
                <li data-color = "red" class="active"></li>
                <li data-color = "orange"></li>
                <li data-color = "darkred"></li>
                <li data-color = "teal"></li>
                <li data-color = "royalblue"></li>
            </ul>
        </div>
        <button type="button" class="close">CLose</button>
    </div>

    <!-- start Quiz  -->
    <div class="quiz-container">
        <div class="header">
            <p>Topic :<span class="top"></span></p>
            <p>Question Count :<span class="count"></span></p>
        </div>
        <div class="question">
        </div>
        <button type="button" class="sub">Submit answer</button>
        <div class="bullets">
            <ul>
                <li data-index="1" class="active"></li>
                <li data-index="2"></li>
                <li data-index="3"></li>
                <li data-index="4"></li>
                <li data-index="5"></li>
                <li data-index="6"></li>
                <li data-index="7"></li>
                <li data-index="8"></li>
                <li data-index="9"></li>
                <li data-index="10"></li>
            </ul>
        </div>
    </div>
    <!-- End Quiz  -->
    <script src="app.js"></script>
</body>
</html>
